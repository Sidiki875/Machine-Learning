{% extends 'healthapp/base.html' %}

{% block content %}
<h2>Sign Up</h2>

<form method="post">
    {% csrf_token %}
    {% for field in form %}
      <div class="form-group">
        {{ field.label_tag }}
        {{ field }}
        {% if field.errors %}
          <small class="text-danger">{{ field.errors }}</small>
        {% endif %}
      </div>
    {% endfor %}
    <button type="submit">Sign Up</button>
</form>

<p> If you already have an account <a href="{% url 'login' %}">Log in</a></p>
{% endblock %}
