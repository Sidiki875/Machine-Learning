{% extends 'healthapp/base.html' %}

{% block content %}
<h2>Login</h2>

<form method="post">
    {% csrf_token %}
    {% for field in form %}
     <div class="form-group">
        {{ field.label_tag }}
        {{ field }}
        {% if field.errors %}
          <small class="text-danger">{{ field.errors }}</small>
        {% endif %}
     </div>
    {% endfor %}
    <button type="submit">Log in</button>
</form>

<p> New user? <a href='/signup'>Sign up</a></p>
{% endblock %}
